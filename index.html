<!DOCTYPE html>
<html>
<head>
<title>AI Video Generator</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

textarea{
width:90%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:15px 30px;
background:#22c55e;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

video{
margin-top:20px;
width:300px;
}
</style>

</head>

<body>

<h1>AI Video Generator</h1>

<p>Enter prompt to generate AI video</p>

<textarea id="prompt"></textarea>

<br><br>

<button onclick="generate()">Generate Video</button>

<p id="status"></p>

<video id="video" controls></video>

<script>

async function generate(){

let prompt=document.getElementById("prompt").value

document.getElementById("status").innerText="Generating video..."

let response = await fetch("https://api.replicate.com/v1/predictions",{
method:"POST",
headers:{
"Authorization":"Token YOUR_REPLICATE_TOKEN",
"Content-Type":"application/json"
},
body:JSON.stringify({
version:"db21e45b6b8eaa9b7b0c8a0a4a4b9e3c3f2b1f0",
input:{
prompt:prompt
}
})
})

document.getElementById("status").innerText="Video generation started..."

}

</script>

</body>
</html>

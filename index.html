<!DOCTYPE html>
<html>
<head>
<title>Pro AI Video Generator</title>
<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}
textarea{
  width:90%;
  height:120px;
  padding:10px;
  font-size:16px;
}
button{
  padding:15px 30px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin:10px;
}
video{
  margin-top:20px;
  width:320px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Professional AI Video Generator</h1>
<p>Enter prompt to generate AI avatar video with voice</p>
<textarea id="prompt" placeholder="Example: Motivational quote in a cinematic style"></textarea>
<br>

<button onclick="generate()">Generate Video</button>
<p id="status"></p>

<video id="video" controls></video>
<br>
<a id="download" download="ai-video.mp4">
<button>Download Video</button>
</a>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mp3">
</audio>

<script>
async function generate(){
  let prompt = document.getElementById("prompt").value;
  if(!prompt){
    alert("Please enter a prompt!");
    return;
  }

  document.getElementById("status").innerText = "Generating AI video...";
  document.getElementById("music").play();

  try{
    // Replicate API call for AI avatar video
    let response = await fetch("https://api.replicate.com/v1/predictions", {
      method:"POST",
      headers:{
        "Authorization":"Token r8_BCo3XfXb4E0tJKPQh5cxkW4mLa7WjFK12kkk7", // <-- अपना token यहाँ है
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        version:"db21e45b6b8eaa9b7b0c8a0a4a4b9e3c3f2b1f0",
        input:{prompt:prompt}
      })
    });

    let data = await response.json();
    console.log(data);

    // Check if video output exists
    if(data.output && data.output.length > 0){
      let videoUrl = data.output[0];
      document.getElementById("video").src = videoUrl;
      document.getElementById("download").href = videoUrl;
      document.getElementById("status").innerText = "Video ready!";
    } else {
      document.getElementById("status").innerText = "Video generation failed!";
    }

    // AI Voice using browser SpeechSynthesis
    if(window.speechSynthesis){
      let utter = new SpeechSynthesisUtterance(prompt);
      utter.lang='en-US';
      window.speechSynthesis.speak(utter);
    }

  }catch(e){
    console.error(e);
    document.getElementById("status").innerText = "Error generating video.";
  }
}
</script>

</body>
</html>
